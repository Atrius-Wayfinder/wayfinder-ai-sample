name: Deploy Basic Agent

on:
  workflow_call:

jobs:
  deploy:
    name: Deploy to Documentation Apps
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for OIDC token exchange
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn workspace @examples/basic-agent build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.BASIC_AGENT_AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sync to S3
        run: aws s3 sync examples/basic-agent/dist/ s3://${{ vars.BASIC_AGENT_S3_BUCKET }}/basic-agent --delete
